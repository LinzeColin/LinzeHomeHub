server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头(页面纯静态、自带本地 Chart.js、仅同源取快照)。
    # 用 expires 指令控缓存,避免 location 内的 add_header 覆盖掉这些 header(nginx 继承规则)。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'none'; frame-ancestors 'self'" always;

    location = /healthz { return 200 "ok\n"; }

    # 快照/历史/价格:实时数据,独立挂载点(不嵌套在只读 web 挂载里),不缓存
    location /data/ {
        alias /srv/data/;
        expires -1;
    }

    # 页面壳与静态资源:短缓存
    location / {
        expires 300s;
        try_files $uri $uri/ /index.html;
    }
}

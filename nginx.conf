server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  # 哈希资产: 一年不可变缓存 (CF 边缘同样缓存 → 大陆访问丝滑关键)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
  # 数据与入口: 短缓存, 保证 home-sync 新卡片快速可见
  location / {
    add_header Cache-Control "public, max-age=300";
    try_files $uri $uri/ /index.html;   # SPA fallback (同 wrangler single-page-application)
  }
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
